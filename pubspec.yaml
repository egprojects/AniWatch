name: anitube
description: A new Flutter application to watch anime.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=2.7.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_platform_widgets: 0.60.1
  cupertino_icons: 0.1.3

  shimmer: 1.1.1

  provider: 4.3.2+1
  injector: 1.0.8

  dio: 3.0.10
  html: 0.14.0+3
  cached_network_image: 2.2.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:

  uses-material-design: true

  fonts:
    - family: Oswald
      fonts:
        - asset: assets/fonts/Oswald.ttf
